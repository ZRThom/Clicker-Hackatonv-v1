<!DOCTYPE HTML>
<html lang="en">
    <body>
        <header>
            test
        </header>

        <div class="LayerMenu">

        </div>

        <div class="LayerGameUISave">

        </div>
        
        <div class="LayerGameUINoSave">
            
            <button type="button" onClick="clicking()">
                Thibidy
            </button>
            <button type="button" onClick="clickingBig()">
                Thibidy2
            </button>
            <button type="button" onClick="clickingReset()">
                ThibidyReset
            </button>

            <p>Request: <span id="clicker1">0</span></p>

            <p>upgrade : every <span id="clicker2">0</span> request</p>

            <button type="button" id="upgradeBtn1" onClick="clickingUpgrade()">
                Multiplyer per click lvl 1 (x1)
            </button>

        </div>

        <div class="LayerSettings">

        </div>

    </body>
</html>

<script type="text/javascript">
    var click = 0;
    var clickPower = 1;
    let upgradeCostMult = 20;

    function updateUI()
    {
        document.getElementById("clicker1").innerHTML = DisplayNbr(click);
        document.getElementById("clicker2").innerHTML = DisplayNbr(upgradeCostMult);
        document.getElementById("upgradeBtn1").innerHTML = "Multiplyer per click lvl " + DisplayNbr(clickPower) +" (x" + DisplayNbr(clickPower) + ")";
    }

    function DisplayNbr(value) // evite 1.20000000000002, le bug de c*n (arrondie au chiffre)
    {
        if (Number.isInteger(value)){
            return value;
        }
        return value.toFixed(1);
    }

    function cleanNbr(value) // pareil
    {
        return Number(value.toFixed(1));
    }
    
    function clicking()
    {
        click += clickPower;
        click = cleanNbr(click); 
        updateUI();
    }

    function clickingBig()
    {
        click += clickPower * 100000;
        click = cleanNbr(click);
        updateUI();
    }

    function clickingReset()
    {
        click = 0;
        clickPower = 1;
        upgradeCostMult = 20;
        updateUI();
    }

    function clickingUpgrade()
    {
        if (click >= upgradeCostMult){
            click -= upgradeCostMult;
            click = cleanNbr(click);
            clickPower *= 1.1;
            clickPower = cleanNbr(clickPower);
            upgradeCostMult *= 1.2;
            updateUI();
        }
    }
    updateUI();
</script>
