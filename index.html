<script type="text/javascript">
    let click = 0;
    
    function clicking()
    {
        click += 1;
        document.getElementById("clicker1").innerHTML = click;
    };

    function clickingBig()
    {
        click += 100;
        document.getElementById("clicker1").innerHTML = click;
    };

    function clickingReset()
    {
        click = 0;
        document.getElementById("clicker1").innerHTML = click;
    };

    function upClicking()
    {
        click++;
        document.getElementById("clicker1").innerHTML = click;
    };
</script>
